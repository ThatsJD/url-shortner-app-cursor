<form class="block-form" [formGroup]="form" (ngSubmit)="submit()">
  <label class="field">
    <span>Social platform</span>
    <select formControlName="platform">
      @for (platform of platforms; track platform) {
        <option [value]="platform">{{ platform }}</option>
      }
    </select>
  </label>

  <label class="field">
    <span>Profile URL</span>
    <input
      type="url"
      formControlName="profileUrl"
      placeholder="https://instagram.com/yourname"
    />
    @if (showError('profileUrl')) {
      <small class="error">Enter a valid profile URL.</small>
    }
  </label>

  <label class="field">
    <span>Username / handle</span>
    <input type="text" formControlName="username" placeholder="@yourname" />
    @if (showError('username')) {
      <small class="error">Username is required.</small>
    }
  </label>

  <div class="actions">
    <button type="button" class="btn btn-secondary" (click)="cancel()">Cancel</button>
    <button type="submit" class="btn btn-primary">Save social link</button>
  </div>
</form>
